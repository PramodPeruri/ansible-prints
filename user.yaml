- name: setup user server
  hosts: user
  become: yes
  tasks:
  - name: disable default nodejs
    ansible.builtin.command: dnf module disable nodejs -y

  - name: enable nodejs 20
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.package:
      name: nodejs
      state: present


  - name: create roboshop system user
    ansible.builtin.user:
      name: roboshop
      comment: prints system user
      system: true
      shell: /sbin/nologin
      home: /app


  - name: remove app directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: create app directory
    ansible.builtin.file:
      state: directory
      path: /app

  - name: delete the file 
    ansible.builtin.file:
      path: /tmp/user.zip
      state: absent

  - name: download user application
    ansible.builtin.get_url:
      url: https://3dprints-artifacts.s3.us-east-1.amazonaws.com/user.zip
      dest: /tmp/user.zip

  - name: extract user application
    ansible.builtin.unarchive:
      src: /tmp/user.zip
      dest: /app/user
      remote_src: yes

  
  - name: install dependencies
    community.general.npm:
      path: /app

  - name: copy user service
    ansible.builtin.copy:
      src: user.service
      dest: /etc/systemd/system/user.service

  - name: start and enable user
    ansible.builtin.service:
       name: user
       enabled: yes
       state: started

  - name: daemon reload enable and start
    ansible.builtin.systemd_service:
       name: user
       enabled: true
       state: started