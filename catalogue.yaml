- name: setup catalogue server
  hosts: catalogue
  become: yes
  tasks:
  - name: disable default nodejs
    ansible.builtin.command: dnf module disable nodejs -y

  - name: enable nodejs 20
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.package:
      name: nodejs
      state: present


  - name: create roboshop system user
    ansible.builtin.user:
      name: roboshop
      comment: prints system user
      system: true
      shell: /sbin/nologin
      home: /app


  - name: remove app directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: create app directory
    ansible.builtin.file:
      state: directory
      path: /app

  - name: delete the file 
    ansible.builtin.file:
      path: /tmp/catalogue-3dprints.zip
      state: absent

  - name: download catalogue application
    ansible.builtin.get_url:
      url: https://3dprints-artifacts.s3.us-east-1.amazonaws.com/catalogue-3dprints.zip
      dest: /tmp/catalogue-3dprints.zip

  - name: extract catalogue application
    ansible.builtin.unarchive:
      src: /tmp/catalogue-3dprints.zip
      dest: /app/catalogue
      remote_src: yes

  
  - name: install dependencies
    community.general.npm:
      path: /app

  - name: copy catalogue service
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: copy mongo repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo
  
  - name: install mongodb client
    ansible.builtin.package:
      name: mongodb-mongosh
      state: present

  - name: connect to mongodb catalogue
    ansible,builtin.command: mongosh mongodb.pramod.shop --quiet --eval "db.getMongo().getDBNames().indexOf('catalogue')"
    regsiter: catalogue_output

  - name: load products into mongodb
    ansible.builtin.shell: mongosh --host mongodb.pramod.shop </app/catalogue/db/master-data.js
    when: catalogue_output.stdout | int < 0

  - name: start and enable catalogue
    ansible.builtin.service:
       name: catalogue
       enabled: yes
       state: started

  - name: daemon reload enable and start
    ansible.builtin.systemd_service:
       name: catalogue
       enabled: true
       state: started