- name: configure frontend server
  hosts: frontend
  become: yes
  tasks:
  - name: disbale default nginx
    ansible.builtin.command: dnf module disable nginx -y

  - name: enable nginx 1.24
    ansible.builtin.command: dnf module enable nginx:1.24 -y

  - name: install nginx
    ansible.builtin.dnf:
      name: nginx
      state: present

  - name: remove html directory
    ansible.builtin.file:
       state: absent
       path: /usr/share/nginx/html/
       state: directory

  - name: download frontend application
    ansible.builtin.get_url:
      url: https://3dprints-artifacts.s3.us-east-1.amazonaws.com/frontend-3dprints.zip
      dest: /tmp/frontend-3dprints.zip

  - name: extract frontend application
    ansible.builtin.unarchive:
      src: /tmp/frontend-3dprints.zip
      dest: /usr/share/nginx/html/
      remote_src: yes

  - name: delete default nginx conf
    ansible.builtin.file:
      state: absent
      path: /etc/nginx/nginx.conf

  - name: copy nginx conf
    ansible.builtin.copy:
      src: nginx.conf
      dest: /etc/nginx/nginx.conf
  
  - name: restart nginx
    ansible.builtin.service:
       name: nginx
       state: restarted
       enabled: yes