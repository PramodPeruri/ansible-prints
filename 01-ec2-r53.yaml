- name: create ec2 and r53
  hosts: local
  connection: local
  vars: 
    ami_id: ami-0220d79f3f480ecf5
    sd_id: sg-0ff14d50fb27e048b
    zone_id: "Z05714843SO1YQWMF1N5N" 
    domain_name: "pramod.shop"
    instance:
    - mongodb
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      instance_type: t3.micro
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      tags:
        Name: "{{ item }}"
    loop: "{{ instances }}"
    register: ec2_output

  - name: print the ec2_output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"